<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
 <title>我が家の予定</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<!-- 🔐 ログイン画面 -->
<div id="loginBox" class="overlay">
  <div class="modal">
    <h2>🔐 パスワード入力</h2>
    <input type="password" id="password" placeholder="パスワード">
    <button onclick="login()">入る</button>
  </div>
</div>

<!-- 📅 アプリ本体 -->
<div id="app" style="display:none;">

  <h1>🏡 家族スケジュール </h1>

  <div class="calendar-header">
    <button onclick="prevMonth()">←</button>
    <h2 id="monthLabel"></h2>
    <button onclick="nextMonth()">→</button>
  </div>

  <div id="calendar" class="calendar"></div>

</div>

<!-- ➕ 入力モーダル -->
<div id="inputModal" class="overlay" style="display:none;">
  <div class="modal">
    <h3 id="selectedDate"></h3>

    <input type="text" id="title" placeholder="予定">
    
    <select id="person">
      <option>パパ</option>
      <option>ママ</option>
      <option>トウカ</option>
      <option>ヒヨリ</option>
      <option>祖母</option>
      <option>祖父</option>
    </select>

    <button onclick="saveSchedule()">保存</button>
    <button onclick="closeModal()">閉じる</button>
  </div>
</div>

<script type="module" src="app.js"></script>
</body>
</html>
